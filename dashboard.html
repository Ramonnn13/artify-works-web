<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#0b0b0b,#2b0000,#120000);
            color:white;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .dashboard{
            background:rgba(255,255,255,0.08);
            padding:40px;
            border-radius:20px;
            text-align:center;
            width:350px;
            border:1px solid rgba(255,255,255,0.1);
            backdrop-filter:blur(10px);
            box-shadow:0 0 25px rgba(0,0,0,0.4);
        }

        .dashboard h1{
            margin-bottom:10px;
            font-size:28px;
        }

        .dashboard p{
            opacity:0.8;
            margin-bottom:25px;
        }

        .dashboard button{
            padding:12px 20px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-weight:bold;
            transition:0.3s;
        }

        .btn-shop{
            background:#00c853;
            color:white;
            margin-right:10px;
        }

        .btn-shop:hover{
            transform:scale(1.05);
        }

        .btn-logout{
            background:#c40000;
            color:white;
        }

        .btn-logout:hover{
            transform:scale(1.05);
        }

        .username-box{
            margin:20px 0;
            padding:15px;
            border-radius:12px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.1);
        }

        .username-box span{
            color:#ff4d4d;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="dashboard">

    <h1>Selamat Datang 👋</h1>

    <p>
        Anda berhasil login ke Artify Works
    </p>

    <div class="username-box">
        Login sebagai:
        <br><br>
        <span id="user"></span>
    </div>

    <button class="btn-shop" onclick="masukShop()">
        🛒 Masuk Shop
    </button>

    <button class="btn-logout" onclick="logout()">
        Logout
    </button>

</div>

<script>

    let user = localStorage.getItem("currentUser");

    if (!user) {

        window.location.href = "index.html";
    }

    document.getElementById("user").textContent = user;

    function masukShop(){

        window.location.href = "shop.html";
    }

    function logout(){

        if(confirm("Yakin ingin logout?")){

            localStorage.removeItem("currentUser");

            window.location.href = "index.html";
        }
    }

</script>

</body>
</html>
