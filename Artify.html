<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#000000,#111111,#1c1c1c);
    color:white;
    padding-bottom:80px;
}

/* bagian palak */

.header-container{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:40px;
    position:relative;
}

.logo-wrapper{
    display:flex;
    align-items:center;
    gap:15px;
}

.profile-img{
    width:65px;
    height:65px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid white;
}

.header-title{
    letter-spacing:2px;
    font-size:32px;
}

/* pengaturan */

.settings-menu{
    position:absolute;
    top:20px;
    right:20px;
}

.settings-btn{
    padding:10px 16px;
    border:none;
    border-radius:20px;
    background:white;
    color:black;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.settings-btn:hover{
    background:#dcdcdc;
}

.dropdown-content{
    display:none;
    position:absolute;
    right:0;
    margin-top:10px;
    background:#ffffff;
    border:1px solid #444;
    border-radius:10px;
    overflow:hidden;
    min-width:120px;
}

.dropdown-content a{
    display:block;
    color:rgb(0, 0, 0);
    padding:12px;
    text-decoration:none;
}

.dropdown-content a:hover{
    background:#222;
}

.show{
    display:block;
}

/* PRODUK */

.table-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
    padding:40px;
}

.art-table{
    background:rgba(255,255,255,0.05);
    border:2px solid #444;
    border-radius:18px;
    padding:15px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.art-table:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(255,255,255,0.1);
}

.art-table img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:12px;
}

.selected{
    border:2px solid white !important;
    box-shadow:0 0 20px rgba(255,255,255,0.4);
}

/* FORM */

.form-box{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
    margin-top:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.form-group label{
    color:#ccc;
    font-size:15px;
}

input,
textarea,
select{
    width:260px;
    padding:12px;
    border-radius:10px;
    border:1px solid #444;
    background:#111;
    color:white;
}

textarea{
    resize:none;
    height:90px;
}

input:focus,
textarea:focus,
select:focus{
    outline:none;
    border:1px solid white;
    box-shadow:0 0 10px rgba(255,255,255,0.2);
}

/* TOMBOL */

.testbtn{
    margin-top:10px;
    padding:14px 25px;
    border:none;
    border-radius:12px;
    background:white;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.testbtn:hover{
    transform:scale(1.05);
    background:#dcdcdc;
}

/* AKUN SOCIAL */

.social-container{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:70px;
    padding:20px;
}

.social-btn{
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px 22px;
    background:white;
    color:black;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 0 15px rgba(255,255,255,0.15);
}

.social-btn i{
    font-size:22px;
}

.social-btn:hover{
    transform:translateY(-5px);
    background:#dcdcdc;
    box-shadow:0 0 20px rgba(255,255,255,0.3);
}

/* FOOTER */

footer{
    text-align:center;
    margin-top:40px;
    opacity:0.5;
    font-size:14px;
}

</style>
</head>

<script>

function toggleDropdown(){

    document.getElementById("myDropdown")
    .classList.toggle("show");
}

function logout(){

    if(confirm("Apakah anda yakin ingin logout?")){

        localStorage.removeItem("currentUser");

        window.location.href = "index.html";
    }
}

window.onclick = function(event){

    if(!event.target.matches('.settings-btn')){

        var dropdowns =
        document.getElementsByClassName("dropdown-content");

        for(var i = 0; i < dropdowns.length; i++){

            var openDropdown = dropdowns[i];

            if(openDropdown.classList.contains('show')){

                openDropdown.classList.remove('show');
            }
        }
    }
}

let selectedPaper = "";

document.querySelectorAll('.art-table')
.forEach(el => {

    el.addEventListener('click', () => {

        document.querySelectorAll('.art-table')
        .forEach(p => p.classList.remove('selected'));

        el.classList.add('selected');

        selectedPaper = el.dataset.item;
    });
});

const currentUser =
localStorage.getItem("currentUser");

if(currentUser){

    document.getElementById("namaPemesan")
    .value = currentUser;
}

const savedAlamat =
localStorage.getItem("alamatUser");

if(savedAlamat){

    document.getElementById("alamatPemesan")
    .value = savedAlamat;
}

function orderWA(){

    const nama =
    document.getElementById("namaPemesan").value;

    const alamat =
    document.getElementById("alamatPemesan").value;

    const deadline =
    document.getElementById("deadline").value;

    const style =
    document.getElementById("style").value;

    if(nama === ""){

        alert("⚠️ Harap masukkan nama!");
        return;
    }

    if(alamat === ""){

        alert("⚠️ Harap masukkan alamat!");
        return;
    }

    if(!selectedPaper){

        alert("⚠️ Harap pilih ukuran kertas!");
        return;
    }

    if(deadline === ""){

        alert("⚠️ Harap pilih deadline!");
        return;
    }

    if(style === ""){

        alert("⚠️ Harap pilih style gambar!");
        return;
    }

    localStorage.setItem("alamatUser",alamat);

    let text =
`Halo Artify Works

Saya ingin memesan Joki Art:

👤 Nama:
${nama}

⚲ Alamat:
${alamat}

Ukuran Kertas:
${selectedPaper}

Style gambar:
${style}

Deadline:
${deadline}

Terima kasih Artify Works ₍₍⚞(˶>ᗜ<˶)⚟⁾⁾`;

    let phone = "6285878990556";

    window.open(
    `https://wa.me/${phone}?text=${encodeURIComponent(text)}`,
    "_blank");
}

function kirimLaporan(){

    const laporan =
    document.getElementById("myDropdown").value;

    if(laporan.trim() === ""){

        alert("⚠️ Isi laporan terlebih dahulu!");
        return;
    }

    let text =
`📢 LAPORAN / KRITIK ARTIFY WORKS

${laporan}

Terima kasih atas masukannya 🙏`;

    let phone = "6285878990556";

    window.open(
    `https://wa.me/${phone}?text=${encodeURIComponent(text)}`,
    "_blank");
}

</script>
