<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Artify Works - Login</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>
    
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(135deg, #000000, #8b0000, #000000);
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:360px;
    background:rgba(0,0,0,0.75);
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 25px rgba(255,0,0,0.5);
    color:white;
}

.title{
    text-align:center;
    font-family:'Orbitron', sans-serif;
    font-size:32px;
    color:red;
    text-shadow:
        2px 2px 0 black,
        0 0 10px red;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:6px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:red;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:darkred;
}

.guest{
    margin-top:10px;
    background:#333;
}

.guest:hover{
    background:#111;
}

.message{
    margin-top:10px;
    text-align:center;
    color:#ff4c4c;
    font-size:14px;
}

.register{
    margin-top:15px;
    text-align:center;
    font-size:14px;
}

.register a{
    color:red;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="login-box">
    <div class="title">ARTIFY WORKS</div>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    
    <button class="guest" onclick="loginGuest()">Login sebagai Guest</button>

    <div class="message" id="message"></div>

    <div class="register">
        Belum punya akun? <a href="#">Daftar</a>
    </div>
</div>

<script>
function login(){
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const message  = document.getElementById("message");

    if(username === "" || password === ""){
        message.textContent = "Username dan password wajib diisi!";
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    const userExist = users.find(u => u.username === username);

    if(userExist && userExist.password !== password){
        message.textContent = "Username sudah dipakai!";
        return;
    }

    const valid = users.find(
        u => u.username === username && u.password === password
    );

    if(valid){
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("currentUser", username);
        window.location.href = "Artify.html";
    }else{
        message.textContent = "Akun tidak ditemukan!";
    }
}

function loginGuest(){
    localStorage.setItem("isLoggedIn", "true");
    localStorage.setItem("currentUser", "Guest");
    window.location.href = "Artify.html";
}
</script>

</body>
</html>
